<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Unidad App</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #7eb8f7;
    --accent2: #a8d0ff;
    --gold: #c9a84c;
    --text: #eef0f5;
    --text2: #8b90a8;
    --text3: #454960;
    --danger: #e05c5c;
    --success: #52c97a;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* starfield bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(126,184,247,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(126,184,247,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(201,168,76,0.08) 0%, transparent 100%),
      radial-gradient(600px at 70% 20%, rgba(126,184,247,0.03) 0%, transparent 70%),
      radial-gradient(400px at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-logo .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-tabs {
    display: flex;
    gap: 3px;
    background: var(--surface);
    padding: 3px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .nav-tab {
    padding: 6px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .nav-tab.active { background: var(--accent); color: #0a0c10; }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text3);
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .sync-dot.ok { background: var(--success); animation: pulse 3s infinite; }
  .sync-dot.loading { background: var(--gold); animation: pulse 0.8s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── PAGES ── */
  .page { display: none; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* ══════════════════
     MUSICIAN VIEW
  ══════════════════ */
  .musician-layout {
    display: grid;
    grid-template-columns: 290px 1fr;
    height: calc(100vh - 53px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .sidebar-top {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
  }

  .setlist-block {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .block-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .block-label .live-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .song-list { flex: 1; overflow-y: auto; padding: 6px 10px; }
  .song-list::-webkit-scrollbar { width: 3px; }
  .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .list-section-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    padding: 10px 6px 4px;
  }

  .song-row {
    padding: 10px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 1px;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .song-row:hover { background: var(--surface2); }
  .song-row.active { background: var(--surface2); border-color: rgba(126,184,247,0.3); }
  .song-row-num {
    font-size: 0.7rem;
    color: var(--accent);
    font-weight: 600;
    width: 16px;
    flex-shrink: 0;
    text-align: center;
  }
  .song-row-info { flex: 1; min-width: 0; }
  .song-row-title {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-row.active .song-row-title { color: var(--accent2); }
  .song-row-artist { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }

  /* Lyrics panel */
  .lyrics-panel {
    overflow-y: auto;
    padding: 48px 72px;
    position: relative;
  }
  .lyrics-panel::-webkit-scrollbar { width: 3px; }
  .lyrics-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .lyrics-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text3);
  }
  .lyrics-empty-icon { font-size: 2.5rem; opacity: 0.2; }

  .lyrics-song-title {
    font-family: 'Lora', serif;
    font-size: 2.2rem;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .lyrics-song-artist { color: var(--accent); font-size: 0.9rem; font-weight: 500; margin-bottom: 32px; }
  .lyrics-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    margin-bottom: 36px;
    opacity: 0.3;
  }

  .lyrics-body {
    font-size: 1.15rem;
    line-height: 2.1;
    color: var(--text);
    font-weight: 300;
    white-space: pre-wrap;
  }
  .section-pill {
    display: inline-block;
    background: rgba(126,184,247,0.08);
    border: 1px solid rgba(126,184,247,0.2);
    color: var(--accent);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 2px 10px;
    border-radius: 20px;
    margin: 18px 0 6px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
  }

  .font-btns {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  .font-btn {
    width: 40px; height: 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text2);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .font-btn:hover { background: var(--accent); color: #0a0c10; border-color: var(--accent); }

  /* ══════════════════
     ADMIN VIEW
  ══════════════════ */
  .admin-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    position: relative;
    z-index: 1;
  }
  .admin-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .admin-heading {
    font-family: 'Lora', serif;
    font-size: 1.7rem;
    color: var(--text);
  }
  .admin-heading span { color: var(--accent); }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .panel-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title .dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; }

  /* Setlist chips */
  .setlist-chips {
    padding: 14px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 56px;
    align-items: flex-start;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.82rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chip-num { color: var(--accent); font-weight: 600; font-size: 0.72rem; }
  .chip-remove { color: var(--text3); cursor: pointer; font-size: 1.1rem; line-height: 1; transition: color 0.15s; }
  .chip-remove:hover { color: var(--danger); }
  .empty-msg { color: var(--text3); font-size: 0.83rem; padding: 4px 0; }

  /* Song cards */
  .songs-list-admin { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .song-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .song-card:hover { border-color: var(--text3); }
  .song-card-head {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .song-card-info { flex: 1; min-width: 0; }
  .song-card-title { font-size: 0.92rem; font-weight: 600; }
  .song-card-sub { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
  .song-card-actions { display: flex; gap: 6px; }

  .card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px 16px;
  }
  .card-body.open { display: block; }
  .lyrics-preview {
    font-size: 0.82rem;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.8;
    max-height: 200px;
    overflow-y: auto;
  }

  /* Buttons */
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: #0a0c10; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(224,92,92,0.3); }
  .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
  .btn-sm { padding: 5px 11px; font-size: 0.76rem; }
  .btn-gold { background: var(--gold); color: #0a0c10; }
  .btn-gold:hover { filter: brightness(1.1); }

  /* Config panel */
  .config-form { padding: 18px 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 0.72rem;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 13px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { min-height: 180px; resize: vertical; line-height: 1.7; }
  .form-hint { font-size: 0.72rem; color: var(--text3); margin-top: 5px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

  /* Status badge */
  .badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-setlist { background: var(--gold); color: #0a0c10; }
  .badge-notion { background: rgba(126,184,247,0.15); color: var(--accent); border: 1px solid rgba(126,184,247,0.3); }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 540px;
    max-height: 88vh;
    overflow-y: auto;
  }
  .modal-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head-title { font-family: 'Lora', serif; font-size: 1.15rem; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.4rem; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px 22px 22px; }

  /* Notion info box */
  .info-box {
    background: rgba(126,184,247,0.05);
    border: 1px solid rgba(126,184,247,0.15);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .info-box strong { color: var(--accent); }
  .info-box a { color: var(--accent); text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.83rem;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    gap: 12px;
    color: var(--text3);
    font-size: 0.85rem;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 680px) {
    .musician-layout { grid-template-columns: 1fr; }
    .sidebar { display: flex; width: 100%; border-right: none; }
    .sidebar.hidden { display: none; }
    .lyrics-panel { padding: 24px 20px; }
    .lyrics-body { font-size: 1rem; }
    .lyrics-song-title { font-size: 1.6rem; }
    .form-row { grid-template-columns: 1fr; }
    .back-btn { display: flex !important; }
  }
  .mobile-menu-btn, .back-btn { display: none; }
  .back-btn {
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem;
    margin-bottom: 20px;
    padding: 0;
  }
  .mobile-menu-btn {
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <span class="dot"></span>
    Unidad App
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="sync-indicator">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">—</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('musician',this)">Músicos</button>
      <button class="nav-tab" onclick="switchPage('admin',this)">Admin</button>
    </div>
  </div>
</nav>

<!-- ══ MUSICIAN PAGE ══ -->
<div class="page active" id="page-musician">
  <div class="musician-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Buscar canción…" oninput="filterSongs(this.value)">
        </div>
      </div>
      <div class="setlist-block">
        <div class="block-label"><span class="live-dot"></span> Setlist de hoy</div>
        <div id="sidebar-setlist-songs"></div>
      </div>
      <div class="list-section-label">Todas las canciones</div>
      <div class="song-list" id="all-songs-sidebar"></div>
    </aside>

    <main class="lyrics-panel" id="lyrics-panel">
      <div class="lyrics-empty" id="lyrics-empty">
        <div class="lyrics-empty-icon">♪</div>
        <div style="font-size:0.88rem">Seleccioná una canción para ver la letra</div>
      </div>
      <div id="lyrics-content" style="display:none">
        <button class="back-btn" onclick="showSidebar()">← Canciones</button>
        <div class="lyrics-song-title" id="lyr-title"></div>
        <div class="lyrics-song-artist" id="lyr-artist"></div>
        <div class="lyrics-divider"></div>
        <div class="lyrics-body" id="lyr-body"></div>
      </div>
    </main>
  </div>

  <div class="font-btns" id="font-btns" style="display:none">
    <button class="font-btn" onclick="changeFontSize(1)" title="Más grande">A+</button>
    <button class="font-btn" onclick="changeFontSize(-1)" title="Más chico">A−</button>
  </div>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div class="page" id="page-admin">
  <div class="admin-wrap">
    <div class="admin-top">
      <div class="admin-heading">Panel <span>Admin</span></div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Nueva canción</button>
    </div>

    <!-- Notion config -->
    <div class="panel" id="notion-config-panel">
      <div class="panel-head">
        <div class="panel-title"><span class="dot"></span> Configuración Notion</div>
        <button class="btn btn-ghost btn-sm" onclick="toggleConfig()">
          <span id="config-toggle-label">Mostrar</span>
        </button>
      </div>
      <div id="config-body" style="display:none">
        <div class="config-form">
          <div class="info-box">
            <strong>¿Cómo conectar Notion?</strong><br>
            1. Creá una base de datos en Notion con columnas: <strong>Título</strong> (title), <strong>Arti
